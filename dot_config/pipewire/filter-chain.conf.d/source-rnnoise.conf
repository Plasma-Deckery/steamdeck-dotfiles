# Noise canceling source — RNNoise
#
# RNNoise: neural network noise suppression, optimized for speech preservation
# Better suited for speech-to-text than DeepFilterNet (less aggressive on voice frequencies)
#
context.modules = [
    { name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description = "Noise Canceling source"
            media.name       = "Noise Canceling source"
            filter.graph = {
                nodes = [
                    {
                        type   = ladspa
                        name   = rnnoise
                        plugin = "librnnoise_ladspa"
                        label  = noise_suppressor_stereo
                        control = {
                            "VAD Threshold (%)"          50.0
                            "VAD Grace Period (ms)"     200
                            "Retroactive VAD Grace (ms)" 100
                        }
                    }
                ]
            }
            audio.position = [ FL FR ]
            capture.props = {
                node.name = "effect_input.rnnoise"
                node.passive = true
            }
            playback.props = {
                node.name = "effect_output.rnnoise"
                media.class = Audio/Source
            }
        }
    }
]
